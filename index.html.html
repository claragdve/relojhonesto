<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Reloj Honesto</title>
<meta property="og:title" content="El Reloj Honesto">
<meta property="og:description" content="El único reloj que te dice lo que piensa de ti.">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e8223a;
    --bg: #0a0a0a;
    --surface: #111;
    --text: #f0ede6;
    --muted: #444;
    --accent: #e8223a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    cursor: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid #1a1a1a;
    z-index: 10;
  }
  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .topbar-right {
    display: flex;
    gap: 8px;
  }
  .lang-pill {
    background: none;
    border: 1px solid #222;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 999px;
    cursor: none;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .lang-pill:hover { border-color: #444; color: #888; }
  .lang-pill.on { border-color: var(--red); color: var(--red); }

  /* Main layout */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* Insult */
  .insult-wrap {
    overflow: hidden;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: -10px;
  }
  .insult {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 14vw, 120px);
    color: var(--red);
    letter-spacing: 8px;
    line-height: 1;
    animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    text-align: center;
    white-space: nowrap;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* Clock canvas */
  .clock-wrap {
    position: relative;
  }
  canvas {
    display: block;
    width: min(340px, 80vw);
    height: min(340px, 80vw);
  }

  /* Digital time */
  .digital {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-top: 20px;
    text-align: center;
  }

  /* Bottom label */
  .bottom-label {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 3px;
    color: #222;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Share button */
  .share-btn {
    position: fixed;
    bottom: 24px;
    right: 32px;
    background: none;
    border: 1px solid #222;
    color: #444;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: none;
    transition: all 0.2s;
  }
  .share-btn:hover { border-color: var(--red); color: var(--red); }
  .share-btn.copied { border-color: #2a7a4a; color: #2a7a4a; }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 99;
  }
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="scanlines"></div>

<div class="topbar">
  <div class="topbar-title">EL RELOJ HONESTO</div>
  <div class="topbar-right" id="langs"></div>
</div>

<div class="main">
  <div class="insult-wrap">
    <div class="insult" id="insult">PUTA</div>
  </div>
  <div class="clock-wrap">
    <canvas id="c" width="680" height="680"></canvas>
  </div>
  <div class="digital" id="dig">00:00:00</div>
</div>

<div class="bottom-label">el único reloj que no te miente</div>
<button class="share-btn" id="shareBtn" onclick="copyLink()">COMPARTIR</button>

<script>
const INSULTS = {
  es: ["PUTA","CABRÓN","GILIPOLLAS","IDIOTA","CAPULLO","MAMÓN","IMBÉCIL","ZOTE","PARDILLO","CENUTRIO","MALNACIDO","LUMPEN","MEMO","PAZGUATO"],
  en: ["BITCH","BASTARD","IDIOT","MORON","JERK","DIMWIT","NUMSKULL","DUMBASS","KNUCKLEHEAD","BONEHEAD","HALFWIT","MUPPET"],
  fr: ["SALOPE","CRÉTIN","ABRUTI","IMBÉCILE","CONNARD","ANDOUILLE","BOULET","NIGAUD","ABRUTI","CROUTON"],
  it: ["STRONZO","COGLIONE","IDIOTA","CRETINO","BASTARDO","SCEMO","FESSO","IMBECILLE","CIALTRONE"],
  de: ["ARSCH","TROTTEL","DEPP","VOLLIDIOT","PFEIFE","SPACKEN","HORNOCHSE","HANSWURST"],
  pt: ["IDIOTA","IMBECIL","BURRO","PALHAÇO","BABACA","OTÁRIO","ESTÚPIDO","PALERMA"],
};

const LANGS = Object.keys(INSULTS);
let lang = 'es';
let lastSec = -1;
let currentWord = 'PUTA';

const cursor = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

function buildLangBar() {
  const wrap = document.getElementById('langs');
  wrap.innerHTML = '';
  LANGS.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-pill' + (l === lang ? ' on' : '');
    b.textContent = l.toUpperCase();
    b.onclick = () => { lang = l; buildLangBar(); newWord(); };
    wrap.appendChild(b);
  });
}

function pick() {
  const arr = INSULTS[lang];
  let w;
  do { w = arr[Math.floor(Math.random() * arr.length)]; } while (w === currentWord && arr.length > 1);
  return w;
}

function newWord() {
  currentWord = pick();
  const el = document.getElementById('insult');
  el.style.animation = 'none';
  el.offsetHeight;
  el.textContent = currentWord;
  el.style.animation = 'slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both';
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 680, cx = W/2, cy = W/2, R = W/2;

function draw() {
  const now = new Date();
  const ms = now.getMilliseconds();
  const sec = now.getSeconds() + ms/1000;
  const min = now.getMinutes() + sec/60;
  const hr  = (now.getHours() % 12) + min/60;

  ctx.clearRect(0,0,W,W);

  // Face
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(cx, cy, R-6, 0, Math.PI*2);
  ctx.fill();

  // Rim
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.arc(cx, cy, R-6, 0, Math.PI*2);
  ctx.stroke();

  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, R-18, 0, Math.PI*2);
  ctx.stroke();

  // Ticks
  for (let i = 0; i < 60; i++) {
    const a = (i/60)*Math.PI*2 - Math.PI/2;
    const maj = i % 5 === 0;
    const r1 = R - 28;
    const r2 = maj ? R - 58 : R - 42;
    ctx.strokeStyle = maj ? '#e8223a' : '#2a2a2a';
    ctx.lineWidth = maj ? 3 : 1;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*r1, cy + Math.sin(a)*r1);
    ctx.lineTo(cx + Math.cos(a)*r2, cy + Math.sin(a)*r2);
    ctx.stroke();
  }

  // Numbers
  ctx.font = '500 36px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 1; i <= 12; i++) {
    const a = (i/12)*Math.PI*2 - Math.PI/2;
    const nr = R - 90;
    ctx.fillText(i, cx + Math.cos(a)*nr, cy + Math.sin(a)*nr);
  }

  // Hand helper
  const hand = (frac, len, width, color, tail) => {
    const a = frac*Math.PI*2 - Math.PI/2;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    if (tail) ctx.moveTo(cx - Math.cos(a)*40, cy - Math.sin(a)*40);
    else ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*len, cy + Math.sin(a)*len);
    ctx.stroke();
  };

  hand(hr/12,  R-130, 14, '#f0ede6', false);
  hand(min/60, R-90,  7,  '#888',    false);

  // Second hand glow
  const sa = (sec/60)*Math.PI*2 - Math.PI/2;
  ctx.strokeStyle = '#e8223a';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(sa)*50, cy - Math.sin(sa)*50);
  ctx.lineTo(cx + Math.cos(sa)*(R-70), cy + Math.sin(sa)*(R-70));
  ctx.stroke();

  // Center dot
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e8223a';
  ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();

  // Update time display
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('dig').textContent = h+':'+m+':'+s;

  // New insult every 4 seconds
  const curSec = now.getSeconds();
  if (curSec !== lastSec) {
    lastSec = curSec;
    if (curSec % 4 === 0) newWord();
  }

  requestAnimationFrame(draw);
}

function copyLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const b = document.getElementById('shareBtn');
    b.textContent = '¡COPIADO!';
    b.classList.add('copied');
    setTimeout(() => { b.textContent = 'COMPARTIR'; b.classList.remove('copied'); }, 2000);
  }).catch(() => {
    prompt('Copia este link:', url);
  });
}

buildLangBar();
draw();
</script>
</body>
</html>
